name: Weekly Blog Pipeline

on:
  schedule:
    - cron: '0 7 * * 3'
  workflow_dispatch:

jobs:
  blog-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Policy radar
        run: node scripts/policy-radar.cjs || true
      - name: Auto-create missing blog posts
        run: node scripts/auto-blog-from-radar.cjs || true
      - name: Rebuild sitemaps
        run: node scripts/rebuild-sitemaps.cjs
      - name: Full SEO audit
        run: node scripts/audit-full-2026.cjs || true
      - name: Commit radar output if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: weekly blog pipeline — policy radar and sitemap refresh"
          git push || true
      - name: IndexNow ping
        run: node scripts/indexnow-ping.cjs
