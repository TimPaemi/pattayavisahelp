name: Weekly Blog Pipeline

on:
  schedule:
    - cron: '0 7 * * 3'
  workflow_dispatch:

jobs:
  blog-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Policy radar
        run: node scripts/policy-radar.cjs || true
      - name: Auto-create missing blog posts
        run: node scripts/auto-blog-from-radar.cjs || true
      - name: Rebuild sitemaps
        run: node scripts/rebuild-sitemaps.cjs
      - name: Full SEO audit
        run: node scripts/audit-full-2026.cjs || true
      - name: IndexNow ping
        run: node scripts/indexnow-ping.cjs
